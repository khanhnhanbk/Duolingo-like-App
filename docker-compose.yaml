services:
  postgres:
    image: postgres:16
    container_name: duolingo_db
    environment:
      POSTGRES_USER: duolingo_user
      POSTGRES_PASSWORD: duolingo_password
      POSTGRES_DB: duolingo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duolingo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: